name: Notification Steward

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps (minimal)
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Notification Steward (check)
        run: |
          python backend/tools/notification_steward.py --check --json
